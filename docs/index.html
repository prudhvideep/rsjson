<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rsjson</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px 32px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        header h1 span {
            color: #525252;
            font-weight: 400;
        }

        .toolbar {
            display: flex;
            gap: 10px;
        }

        button {
            background: #171717;
            color: #e5e5e5;
            border: 1px solid #262626;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        button:hover {
            background: #262626;
            border-color: #404040;
        }

        button.primary {
            background: #e5e5e5;
            color: #0a0a0a;
            border-color: #e5e5e5;
            font-weight: 500;
        }

        button.primary:hover {
            background: #ffffff;
        }

        .editor {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: #1a1a1a;
            min-height: 0;
        }

        .pane {
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
            min-height: 0;
        }

        .pane-header {
            padding: 12px 20px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #525252;
            border-bottom: 1px solid #1a1a1a;
            flex-shrink: 0;
        }

        textarea {
            flex: 1;
            background: transparent;
            color: #e5e5e5;
            border: none;
            padding: 20px;
            font-family: "JetBrains Mono", "Fira Code", "SF Mono", monospace;
            font-size: 13px;
            line-height: 1.7;
            resize: none;
            outline: none;
            tab-size: 4;
        }

        textarea::placeholder {
            color: #333;
        }

        .output {
            flex: 1;
            padding: 20px;
            font-family: "JetBrains Mono", "Fira Code", "SF Mono", monospace;
            font-size: 13px;
            line-height: 1.7;
            overflow: auto;
            white-space: pre;
        }

        .output.error {
            color: #ef4444;
        }

        .output.success {
            color: #a3e635;
        }

        .status {
            padding: 12px 32px;
            border-top: 1px solid #1a1a1a;
            font-size: 12px;
            color: #404040;
            display: flex;
            justify-content: space-between;
        }

        @media (max-width: 768px) {
            .editor {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>rsjson <span>/ formatter</span></h1>
        <div class="toolbar">
            <button onclick="clearAll()">Clear</button>
            <button onclick="copyOutput()">Copy</button>
            <button class="primary" onclick="formatJson()">Format</button>
        </div>
    </header>

    <div class="editor">
        <div class="pane">
            <div class="pane-header">Input</div>
            <textarea id="input" placeholder='Paste JSON here...' spellcheck="false"></textarea>
        </div>
        <div class="pane">
            <div class="pane-header">Output</div>
            <div class="output" id="output"></div>
        </div>
    </div>

    <div class="status">
        <span id="status-msg">Ready</span>
        <span>Powered by rsjson + WebAssembly</span>
    </div>

    <script type="module">
        import init, { print } from './rsjson_wasm.js';

        await init();

        window.formatJson = () => {
            const input = document.getElementById('input').value.trim();
            const output = document.getElementById('output');
            const status = document.getElementById('status-msg');

            if (!input) {
                output.textContent = '';
                output.className = 'output';
                status.textContent = 'Ready';
                return;
            }

            const result = print(input);

            const isError = result.startsWith('Error') ||
                            result.startsWith('unexpe') ||
                            result.startsWith('invalid');

            output.textContent = result;
            output.className = isError ? 'output error' : 'output success';
            status.textContent = isError ? 'Parse error' : 'Formatted';
        };

        window.clearAll = () => {
            document.getElementById('input').value = '';
            document.getElementById('output').textContent = '';
            document.getElementById('output').className = 'output';
            document.getElementById('status-msg').textContent = 'Ready';
        };

        window.copyOutput = () => {
            const text = document.getElementById('output').textContent;
            if (text) {
                navigator.clipboard.writeText(text);
                document.getElementById('status-msg').textContent = 'Copied!';
            }
        };

        document.getElementById('input').addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
                formatJson();
            }
        });
    </script>
</body>
</html>
